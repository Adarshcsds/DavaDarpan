{% extends "patient_portal_base.html" %}
{% block title %}Edit Ledger Entry | Subject{% endblock %}

{% block portal_content %}
<h1>Edit Ledger Entry</h1>
<p>Update supply type, note, and amount.</p>

<form method="post" action="{{ url_for('patient_update_expense', expense_id=expense.id) }}">
    <div class="form-group">
        <label for="category">Supply Type</label>
        <input id="category" name="category" type="text" value="{{ expense.category }}" required>
    </div>
    <div class="form-group">
        <label for="description">Note</label>
        <input id="description" name="description" type="text" value="{{ expense.description or '' }}">
    </div>
    <div class="form-group">
        <label for="amount">Amount (Rs.)</label>
        <input id="amount" name="amount" type="number" min="0.01" step="0.01" value="{{ '%.2f'|format(expense.amount) }}" required>
    </div>
    <button class="btn btn-inline" type="submit">Save Entry</button>
    <a class="btn btn-inline btn-secondary" href="{{ url_for('patient_expenses') }}">Cancel</a>
</form>
{% endblock %}
