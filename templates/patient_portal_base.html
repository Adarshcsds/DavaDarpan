{% extends "base.html" %}

{% block body_class %}auth-page{% endblock %}

{% block extra_head %}
<style>
    .portal-shell {
        position: relative;
        z-index: 3;
    }

    .portal-menu-wrap {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 20;
    }

    .portal-menu-btn {
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(10, 12, 16, 0.42);
        border-radius: 14px;
        width: 48px;
        height: 48px;
        font-size: 1.35rem;
        cursor: pointer;
        color: #ffffff;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
        backdrop-filter: blur(16px);
    }

    .portal-menu {
        margin-top: 0.7rem;
        width: 260px;
        background: rgba(10, 12, 16, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 18px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
        overflow: hidden;
        backdrop-filter: blur(18px) saturate(140%);
        opacity: 0;
        visibility: hidden;
        transform: translateX(-18px);
        transition: opacity 0.2s ease, transform 0.22s ease, visibility 0.22s ease;
    }

    .portal-menu.open {
        opacity: 1;
        visibility: visible;
        transform: translateX(0);
    }

    .portal-menu a {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.95rem 1rem;
        text-decoration: none;
        color: #f6f1f1;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        font-weight: 600;
    }

    .portal-menu a:last-child {
        border-bottom: none;
    }

    .portal-menu a:hover {
        background: linear-gradient(90deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
        color: #ffffff;
    }

    .portal-card {
        padding-top: 4rem;
        background: var(--card) !important;
    }

    .portal-kicker {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.7rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        color: #ffffff;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin-bottom: 1rem;
    }

    .portal-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        margin-top: 1.5rem;
    }

    .portal-option {
        display: block;
        text-decoration: none;
        color: inherit;
        padding: 1.2rem;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background:
            radial-gradient(circle at top right, rgba(255, 59, 59, 0.18), transparent 34%),
            linear-gradient(180deg, rgba(10, 12, 16, 0.35), rgba(10, 12, 16, 0.2));
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(18px) saturate(140%);
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .portal-option:hover {
        transform: translateY(-3px);
        border-color: rgba(255, 255, 255, 0.24);
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
    }

    .portal-option strong {
        display: block;
        color: #ffffff;
        font-size: 1.02rem;
        margin-bottom: 0.4rem;
    }

    .portal-option span {
        display: block;
        color: rgba(255, 255, 255, 0.82);
        line-height: 1.5;
        font-size: 0.93rem;
    }

    .portal-option-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2.4rem;
        height: 2.4rem;
        border-radius: 12px;
        margin-bottom: 0.9rem;
        background: linear-gradient(135deg, #ff3b3b, #ff6b6b);
        color: #fff;
        font-size: 1.15rem;
        box-shadow: 0 10px 20px rgba(255, 59, 59, 0.22);
    }

    .portal-option-featured {
        background:
            radial-gradient(circle at top right, rgba(255, 255, 255, 0.12), transparent 34%),
            radial-gradient(circle at left center, rgba(255, 59, 59, 0.18), transparent 40%),
            linear-gradient(135deg, rgba(10, 12, 16, 0.42), rgba(10, 12, 16, 0.24));
        border-color: rgba(255, 255, 255, 0.18);
    }

    .portal-option-featured .portal-option-mark {
        background: linear-gradient(135deg, #ff3b3b, #ff8a5b);
    }

    .portal-option-featured strong {
        font-size: 1.08rem;
    }

    @media (min-width: 900px) {
        .portal-option-featured {
            grid-column: span 2;
        }
    }

    @media (max-width: 700px) {
        .portal-menu-wrap {
            position: static;
            margin-bottom: 1rem;
        }

        .portal-card {
            padding-top: 1.5rem;
        }

        .portal-menu {
            width: 100%;
        }

        .portal-option-featured {
            grid-column: span 1;
        }
    }
</style>
{% endblock %}

{% block content %}
<section class="portal-shell">
    <div class="portal-menu-wrap">
        <button id="portal-menu-btn" class="portal-menu-btn" type="button" aria-label="Menu">☰</button>
        <nav id="portal-menu" class="portal-menu" aria-label="Subject Options">
            <a href="{{ url_for('patient_treatment') }}"><span>Current Care Log</span><span>01</span></a>
            <a href="{{ url_for('patient_expenses') }}"><span>Supply Ledger</span><span>02</span></a>
            <a href="{{ url_for('patient_reports') }}"><span>Report Vault</span><span>03</span></a>
            <a href="{{ url_for('patient_xray') }}"><span>X-Ray Scanner</span><span>04</span></a>
            <a href="{{ url_for('patient_chatbot') }}"><span>Virtual Nurse</span><span>05</span></a>
        </nav>
    </div>
    <section class="card portal-card">
        {% block portal_content %}{% endblock %}
    </section>
</section>
<script>
    (function () {
        const btn = document.getElementById("portal-menu-btn");
        const menu = document.getElementById("portal-menu");
        if (!btn || !menu) {
            return;
        }
        btn.addEventListener("click", function () {
            menu.classList.toggle("open");
        });
        document.addEventListener("click", function (event) {
            if (!menu.contains(event.target) && event.target !== btn) {
                menu.classList.remove("open");
            }
        });
    })();
</script>
{% endblock %}
